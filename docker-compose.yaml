version: "3.8"

services:

  db:
    image: postgres:14
    container_name: leaveworkflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DBUser@!!
      POSTGRES_DB: leave_workflowDB
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: sh -c "npm run migrate && npm start"
    container_name: leaveworkflow-api
    restart: always
    ports:
      - "3003:3003"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: DBUser@!!
      DB_NAME: leave_workflowDB
      JWT_SECRET: devsecret
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: