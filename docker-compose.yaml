version: "3.8"

services:

  db:
    image: postgres:14
    container_name: leaveworkflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DBUser@!!
      POSTGRES_DB: leave_workflowDB
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: leaveworkflow-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: DBUser@!!
      DB_NAME: leave_workflowDB
      JWT_SECRET: devsecret
    depends_on:
      - db

volumes:
  db_data: